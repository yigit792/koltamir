<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Pskoltamir PRO Test</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.container {
  padding:20px;
}

button {
  padding:15px 30px;
  font-size:18px;
  margin:15px;
  cursor:pointer;
}

#controller {
  position:relative;
  width:500px;
  margin:30px auto;
}

.btn {
  position:absolute;
  width:40px;
  height:40px;
  border-radius:50%;
  background:grey;
  line-height:40px;
  font-weight:bold;
}

/* Tuş konumları */
#cross { top:180px; left:320px; }
#circle { top:140px; left:360px; }
#triangle { top:100px; left:320px; }
#square { top:140px; left:280px; }

/* Analoglar */
.stick {
  position:absolute;
  width:80px;
  height:80px;
  border:2px solid white;
  border-radius:50%;
}

#leftStick { top:200px; left:100px; }
#rightStick { top:200px; left:250px; }

.stick-inner {
  width:20px;
  height:20px;
  background:#00ffcc;
  border-radius:50%;
  position:absolute;
  top:30px;
  left:30px;
}

#serial {
  margin-top:20px;
  font-size:18px;
}
</style>

</head>

<body>

<div class="container">
  <h1>🎮 PRO Kol Test</h1>
  <button onclick="connect()">Kolu Bağla</button>

  <div id="serial">Seri: -</div>

  <div id="controller">

    <!-- Tuşlar -->
    <div class="btn" id="cross">X</div>
    <div class="btn" id="circle">O</div>
    <div class="btn" id="triangle">△</div>
    <div class="btn" id="square">▢</div>

    <!-- Analog -->
    <div class="stick" id="leftStick">
      <div class="stick-inner" id="ls"></div>
    </div>

    <div class="stick" id="rightStick">
      <div class="stick-inner" id="rs"></div>
    </div>

  </div>
</div>

<script>

let device;

async function connect() {
  const devices = await navigator.hid.requestDevice({filters:[]});
  if (!devices.length) return;

  device = devices[0];
  await device.open();

  document.getElementById("serial").innerText =
    "Seri: " + (device.serialNumber || "Bilinmiyor");

  device.addEventListener("inputreport", handleInput);
}

function handleInput(e) {
  const data = new Uint8Array(e.data.buffer);

  // 🎮 TUŞLAR (örnek mapping - değişebilir)
  setBtn("cross", data[0] & 1);
  setBtn("circle", data[0] & 2);
  setBtn("triangle", data[0] & 4);
  setBtn("square", data[0] & 8);

  // 🎮 ANALOG (örnek)
  let lx = data[1];
  let ly = data[2];

  let rx = data[3];
  let ry = data[4];

  moveStick("ls", lx, ly);
  moveStick("rs", rx, ry);
}

function setBtn(id, active) {
  document.getElementById(id).style.background =
    active ? "#00ff00" : "grey";
}

function moveStick(id, x, y) {
  const el = document.getElementById(id);

  let nx = (x - 128) / 2;
  let ny = (y - 128) / 2;

  el.style.left = (30 + nx) + "px";
  el.style.top = (30 + ny) + "px";
}

</script>

</body>
</html>
